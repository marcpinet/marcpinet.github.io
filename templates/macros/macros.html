{# Legacy macros kept for compatibility. Most templates now render inline. #}

{% macro content(page) %}
<article class="post-article">
  {% if page.date %}
    <div class="post-meta">
      <time datetime="{{ page.date }}">{{ page.date | date(format="%B %Y") }}</time>
    </div>
  {% endif %}
  <h1 class="post-title">{{ page.title }}</h1>
  <section class="post-body">
    {{ page.content | safe }}
  </section>
</article>
{% endmacro content %}
