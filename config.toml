# The URL the site will be built for
base_url = "https://marcpinet.fr"
title = "Marc Pinet"
# Site-wide default description: used on the homepage and as the fallback for any
# page/section that doesn't define its own `description` in front-matter.
description = "Marc Pinet — PhD student in machine learning at Orange & LIG (Université Grenoble Alpes), working on detection and explanation of anomalies in time series."
generate_feeds = false
minify_html = true

output_dir = "public"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

build_search_index = false

[markdown]
render_emoji = true

[markdown.highlighting]
style = "class"
theme = "github-dark"

[extra]
favicon = "/favicon.svg"

# Homepage "News" feed: only scan items dated on/after this (ISO). No upper bound —
# everything newer shows; items older than 1 year collapse behind a "show more".
news_start = "2025-11-01"

menu = [
    { name = "Publications", url = "/publications", weight = 1 },
    { name = "Experience", url = "/experience", weight = 2 },
    { name = "Education", url = "/education", weight = 3 },
    { name = "Projects", url = "/projects", weight = 4 },
    { name = "Misc.", url = "/misc", weight = 5 },
]

socials = [
    { name = "Email", url = "mailto:marc.pinet.06@gmail.com" },
    { name = "Scholar", url = "https://scholar.google.com/citations?user=NsXT970AAAAJ" },
    { name = "GitHub", url = "https://github.com/marcpinet/" },
    { name = "LinkedIn", url = "https://www.linkedin.com/in/marc-pinet/" },
    { name = "X", url = "https://x.com/marcpinet0/" },
    { name = "CV", url = "https://raw.githubusercontent.com/marcpinet/marcpinet.github.io/cv/cv.pdf" },
]
