# The URL the site will be built for
base_url = "https://marcpinet.fr"
title = "Marc Pinet"
description = "Personal home page."
generate_feeds = false
minify_html = true

output_dir = "public"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

build_search_index = false

[markdown]
render_emoji = true

[markdown.highlighting]
style = "class"
theme = "github-dark"

[extra]
favicon = "/favicon.svg"

# Homepage "News" feed: items (custom + recent publications/projects) older than
# this many days are hidden automatically. ~183 = 6 months. Bump to 365 if sparse.
news_window_days = 183

menu = [
    { name = "Publications", url = "/publications", weight = 1 },
    { name = "Experience", url = "/experience", weight = 2 },
    { name = "Education", url = "/education", weight = 3 },
    { name = "Projects", url = "/projects", weight = 4 },
    { name = "Misc.", url = "/misc", weight = 5 },
]

socials = [
    { name = "Email", url = "mailto:marc.pinet.06@gmail.com" },
    { name = "Scholar", url = "https://scholar.google.com/citations?user=NsXT970AAAAJ" },
    { name = "GitHub", url = "https://github.com/marcpinet/" },
    { name = "LinkedIn", url = "https://www.linkedin.com/in/marc-pinet/" },
    { name = "X", url = "https://x.com/marcpinet0/" },
    { name = "CV", url = "https://raw.githubusercontent.com/marcpinet/marcpinet.github.io/cv/cv.pdf" },
]
